version: '3.8'

services:
  # API сервер
  api:
    build: .
    container_name: cinema-api
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://user:password@db/cinema_db
      - SECRET_KEY=${SECRET_KEY:-your-secret-key-here}
      - DEBUG=${DEBUG:-false}
    volumes:
      - ./uploads:/app/uploads
      - ./logs:/app/logs
      - ./static:/app/static
    depends_on:
      - db
      - redis
    restart: unless-stopped
    networks:
      - cinema-network

  # База данных PostgreSQL
  db:
    image: postgres:15-alpine
    container_name: cinema-db
    environment:
      - POSTGRES_USER=user
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=cinema_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    networks:
      - cinema-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d cinema_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis для кэширования
  redis:
    image: redis:7-alpine
    container_name: cinema-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - cinema-network
    command: redis-server --appendonly yes

  # Adminer для управления БД
  adminer:
    image: adminer
    container_name: cinema-adminer
    ports:
      - "8080:8080"
    networks:
      - cinema-network

  # Nginx для прокси и статики
  nginx:
    image: nginx:alpine
    container_name: cinema-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
      - ./ssl:/etc/nginx/ssl
      - ./static:/usr/share/nginx/static
      - ./uploads:/usr/share/nginx/uploads
    depends_on:
      - api
    networks:
      - cinema-network

  # Celery для фоновых задач
  celery:
    build: .
    container_name: cinema-celery
    command: celery -A worker.celery worker --loglevel=info
    environment:
      - DATABASE_URL=postgresql://user:password@db/cinema_db
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - db
      - redis
    networks:
      - cinema-network

  # Celery beat для периодических задач
  celery-beat:
    build: .
    container_name: cinema-celery-beat
    command: celery -A worker.celery beat --loglevel=info
    environment:
      - DATABASE_URL=postgresql://user:password@db/cinema_db
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - db
      - redis
    networks:
      - cinema-network

  # Мониторинг (Prometheus + Grafana)
  prometheus:
    image: prom/prometheus:latest
    container_name: cinema-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=200h'
      - '--web.enable-lifecycle'
    networks:
      - cinema-network

  grafana:
    image: grafana/grafana:latest
    container_name: cinema-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
    depends_on:
      - prometheus
    networks:
      - cinema-network

volumes:
  postgres_data:
  redis_data:
  prometheus_data:
  grafana_data:

networks:
  cinema-network:
    driver: bridge