global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'fastapi'
    static_configs:
      - targets: ['api:8000']
    metrics_path: /metrics

  - job_name: 'postgres'
    static_configs:
      - targets: ['db:9187']

  - job_name: 'redis'
    static_configs:
      - targets: ['redis:9121']

  - job_name: 'node'
    static_configs:
      - targets: ['api:9100']

alerting:
  alertmanagers:
    - static_configs:
        - targets:
        # - alertmanager:9093

rule_files:
# - "first_rules.yml"
# - "second_rules.yml"